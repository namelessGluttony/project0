<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Live gold and silver prices by city in India with quantity filters, auto-refresh, cache fallback, and trend view.">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Metal Prices Today">
  <meta property="og:description" content="Track live metal rates, compare daily movement, and view 7-day/30-day trends.">
  <meta property="og:url" content="./metals.html">
  <meta property="og:site_name" content="Metal Prices">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Metal Prices Today">
  <meta name="twitter:description" content="Live gold and silver rates with city, quantity, and trend filters.">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Metal Prices Today</title>
  <style>
    :root {
      --bg: #000000;
      --card: #0f0f10;
      --text: #f4f4f5;
      --accent: #f5c542;
      --border: #262628;
      --muted: #c9c9d2;
      --muted-2: #9fa0ad;
      --surface-2: #131316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .page-grid {
      display: grid;
      grid-template-columns: minmax(340px, 760px) minmax(220px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: 0.2px;
    }
    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.92rem;
    }
    #status {
      margin-top: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    #meta {
      margin-top: 4px;
      font-size: 0.8rem;
      color: var(--muted-2);
    }
    .toolbar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field {
      display: grid;
      gap: 4px;
    }
    .field label {
      color: #d7d7de;
      font-size: 0.8rem;
    }
    select, button, input[type="checkbox"] {
      font: inherit;
    }
    select {
      background: var(--surface-2);
      color: #ffffff;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 7px 8px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    select:focus {
      border-color: #4b5563;
      box-shadow: 0 0 0 2px rgba(245, 197, 66, 0.18);
    }
    .action-btn {
      background: #f9fafb;
      color: #101113;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .action-btn:hover { filter: brightness(0.96); }
    .action-btn:active { transform: translateY(1px); }
    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .metal-section {
      margin-top: 16px;
    }
    .metal-title {
      margin: 0 0 6px;
      font-size: 0;
      line-height: 1;
    }
    .metal-icon {
      display: inline-block;
      width: 46px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2);
      position: relative;
    }
    .metal-icon::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 6px;
      height: 2px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.45);
    }
    .gold-biscuit { background: linear-gradient(180deg, #f6d365 0%, #d8a323 100%); }
    .silver-biscuit {
      background: linear-gradient(180deg, #e8ebf0 0%, #9ea7b5 100%);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 9px;
      font-size: 0.92rem;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 8px 6px;
    }
    th {
      color: #ffffff;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      background: #111214;
    }
    tbody tr:hover {
      background: #121317;
    }
    .delta-up { color: #4ade80; font-weight: 600; }
    .delta-down { color: #f87171; font-weight: 600; }
    .delta-flat { color: #a3a3a3; font-weight: 600; }
    .chart-wrap {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: var(--surface-2);
    }
    .chart-title {
      margin: 0 0 8px;
      font-size: 0.9rem;
      color: #d8d8df;
    }
    .trend-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .trend-btn {
      border: 1px solid #2f2f33;
      background: #0e0f12;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .trend-btn.active {
      background: #f5c542;
      color: #111;
      border-color: #f5c542;
      font-weight: 700;
    }
    #trendChart {
      width: 100%;
      height: 120px;
      display: block;
      background: #0c0c0d;
      border-radius: 8px;
    }
    .error-box {
      margin-top: 12px;
      border: 1px solid #7f1d1d;
      background: rgba(127, 29, 29, 0.2);
      color: #fecaca;
      border-radius: 8px;
      padding: 10px;
      display: none;
    }
    .skeleton {
      margin-top: 12px;
      display: none;
      gap: 8px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, #1a1a1c 0%, #2a2a2d 50%, #1a1a1c 100%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (max-width: 980px) {
      .page-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body {
        padding: 12px;
      }
      .card {
        padding: 14px;
      }
      .top-row {
        flex-wrap: wrap;
      }
      .toolbar {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 10px;
      }
      .toolbar-actions {
        width: 100%;
      }
      .toolbar-actions .action-btn {
        flex: 1 1 100%;
      }
      th, td {
        padding: 8px 5px;
        font-size: 0.84rem;
      }
      #trendChart {
        height: 150px;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1.1rem;
      }
      .toolbar {
        grid-template-columns: 1fr;
      }
      .yesterday-col,
      .delta-col {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-grid">
    <main class="card">
      <div class="top-row">
        <h1>Metal Rates</h1>
        <a class="back-link" href="./index.html">Back</a>
      </div>
      <div id="status">Loading...</div>
      <div id="meta">Last updated: --</div>

      <div class="toolbar">
        <div class="field">
          <label for="citySelect">City</label>
          <select id="citySelect">
            <option value="bangalore" selected>Bangalore</option>
            <option value="mumbai">Mumbai</option>
            <option value="chennai">Chennai</option>
            <option value="delhi">Delhi</option>
            <option value="hyderabad">Hyderabad</option>
          </select>
        </div>
        <div class="field">
          <label for="qtySelect">Quantity</label>
          <select id="qtySelect">
            <option value="1" selected>1g</option>
            <option value="8">8g</option>
            <option value="10">10g</option>
            <option value="100">100g</option>
          </select>
        </div>
        <div class="field">
          <label for="refreshSelect">Auto-refresh</label>
          <select id="refreshSelect">
            <option value="1" selected>1 min</option>
            <option value="2">2 min</option>
            <option value="3">3 min</option>
            <option value="4">4 min</option>
            <option value="5">5 min</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="toolbar-actions">
            <button class="action-btn" id="detectCityBtn" type="button">Use My Location</button>
            <button class="action-btn" id="exportBtn" type="button">Copy to Clipboard</button>
          </div>
        </div>
      </div>

      <div class="error-box" id="errorBox">
        Could not load live rates.
        <button class="action-btn" id="retryBtn" type="button">Retry</button>
      </div>

      <div class="skeleton" id="skeleton">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>

      <section id="goldSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-icon gold-biscuit" aria-hidden="true"></span><span class="sr-only">Gold</span></h2>
        <div class="table-wrap">
          <table id="goldTable">
            <thead>
              <tr>
                <th>Karat</th>
                <th>Today (INR)</th>
                <th class="yesterday-col">Yesterday (INR)</th>
                <th class="delta-col">Change vs yesterday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="silverSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-icon silver-biscuit" aria-hidden="true"></span><span class="sr-only">Silver</span></h2>
        <div class="table-wrap">
          <table id="silverTable">
            <thead>
              <tr>
                <th>Type</th>
                <th>Today (INR)</th>
                <th class="yesterday-col">Yesterday (INR)</th>
                <th class="delta-col">Change vs yesterday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <div class="chart-wrap">
        <div class="trend-controls">
          <button class="trend-btn active" id="trend7Btn" type="button">7 days</button>
          <button class="trend-btn" id="trend30Btn" type="button">30 days</button>
        </div>
        <p class="chart-title" id="chartTitle">Trend (selected qty)</p>
        <canvas id="trendChart" width="700" height="120"></canvas>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://services.timesofindia.com/ufs-utility/utility/metals/get/widget/data?pc=toi&pfm=web&client=toi&fv=1000";
    const GRAMS = [1, 8, 10, 100];

    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const citySelect = document.getElementById("citySelect");
    const qtySelect = document.getElementById("qtySelect");
    const refreshSelect = document.getElementById("refreshSelect");
    const exportBtn = document.getElementById("exportBtn");
    const retryBtn = document.getElementById("retryBtn");
    const detectCityBtn = document.getElementById("detectCityBtn");
    const errorBox = document.getElementById("errorBox");
    const skeleton = document.getElementById("skeleton");
    const goldSection = document.getElementById("goldSection");
    const silverSection = document.getElementById("silverSection");
    const goldTbody = document.querySelector("#goldTable tbody");
    const silverTbody = document.querySelector("#silverTable tbody");
    const chartTitle = document.getElementById("chartTitle");
    const chartCanvas = document.getElementById("trendChart");
    const trend7Btn = document.getElementById("trend7Btn");
    const trend30Btn = document.getElementById("trend30Btn");

    let timer = null;
    let isLoading = false;
    let selectedQty = 1;
    let selectedCity = "bangalore";
    let selectedRangeDays = 7;
    let cityManuallySelected = false;
    let latestGoldData = null;
    let latestSilverData = null;
    const CACHE_PREFIX = "metal-rates-cache-v1:";
    const TREND_PREFIX = "metal-rates-trend-v1:";
    const CITY_COORDS = {
      bangalore: { lat: 12.9716, lon: 77.5946, label: "Bangalore" },
      mumbai: { lat: 19.0760, lon: 72.8777, label: "Mumbai" },
      chennai: { lat: 13.0827, lon: 80.2707, label: "Chennai" },
      delhi: { lat: 28.6139, lon: 77.2090, label: "Delhi" },
      hyderabad: { lat: 17.3850, lon: 78.4867, label: "Hyderabad" }
    };

    function endpoint(metal, city) {
      return API_BASE + "&metal=" + metal + "&city=" + encodeURIComponent(city);
    }

    function metricForGrams(metricList, grams) {
      if (!Array.isArray(metricList)) return null;
      return metricList.find((row) => row.quantityInGrams === grams) || null;
    }

    function money(value) {
      if (value == null) return "Not available";
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0
      }).format(value);
    }

    function deltaHtml(value) {
      if (value == null) return "Not available";
      if (value > 0) return '<span class="delta-up">▲ +' + money(value) + "</span>";
      if (value < 0) return '<span class="delta-down">▼ -' + money(Math.abs(value)) + "</span>";
      return '<span class="delta-flat">■ ' + money(0) + "</span>";
    }

    function renderTableRows() {
      if (!latestGoldData || !latestSilverData) return;
      const goldMetrics = latestGoldData.metalMetrics || {};
      const silverMetrics = latestSilverData.metalMetrics || {};

      const goldRows = [
        ["24k", goldMetrics.gold24],
        ["22k", goldMetrics.gold22],
        ["18k", goldMetrics.gold18]
      ];

      goldTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        goldRows.forEach(([label, metrics]) => {
          const row = metricForGrams(metrics, g);
          const tr = document.createElement("tr");
          tr.dataset.qty = String(g);
          tr.innerHTML =
            "<td>" + label + " (" + g + "g)</td>" +
            "<td>" + money(row ? row.todayPrice : null) + "</td>" +
            '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
            '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
          goldTbody.appendChild(tr);
        });
      });

      silverTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        const row = metricForGrams(silverMetrics.silver, g);
        const tr = document.createElement("tr");
        tr.dataset.qty = String(g);
        tr.innerHTML =
          "<td>Silver (" + g + "g)</td>" +
          "<td>" + money(row ? row.todayPrice : null) + "</td>" +
          '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
          '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
        silverTbody.appendChild(tr);
      });

      applyQtyFilter();
      drawMiniTrend();
      goldSection.hidden = false;
      silverSection.hidden = false;
    }

    function applyQtyFilter() {
      document.querySelectorAll("tbody tr").forEach((tr) => {
        tr.style.display = tr.dataset.qty === String(selectedQty) ? "" : "none";
      });
    }

    function drawMiniTrend() {
      const ctx = chartCanvas.getContext("2d");
      if (!ctx || !latestGoldData || !latestSilverData) return;

      const trendData = readTrendStore(selectedCity);
      const points = trendData
        .filter((row) => row.qty === selectedQty)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(-selectedRangeDays);
      if (!points.length) {
        chartTitle.textContent = selectedRangeDays + "-day trend (" + selectedQty + "g): no history yet";
        return;
      }

      const w = chartCanvas.width;
      const h = chartCanvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0c0c0d";
      ctx.fillRect(0, 0, w, h);

      const vals = points.flatMap((p) => [p.gold, p.silver]).filter((v) => typeof v === "number");
      const min = Math.min(...vals, 0);
      const max = Math.max(...vals, 1);
      const span = Math.max(max - min, 1);
      const padX = 28;
      const padY = 16;
      const step = points.length > 1 ? (w - padX * 2) / (points.length - 1) : 0;

      ctx.strokeStyle = "#2a2a2f";
      ctx.beginPath();
      ctx.moveTo(padX, h - padY);
      ctx.lineTo(w - padX, h - padY);
      ctx.stroke();

      const drawSeries = (key, color) => {
        ctx.lineWidth = 2;
        ctx.beginPath();
        points.forEach((p, i) => {
          const value = p[key];
          const x = padX + i * step;
          const y = h - padY - ((value - min) / span) * (h - padY * 2);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = color;
        ctx.stroke();

        points.forEach((p, i) => {
          const value = p[key];
          const x = padX + i * step;
          const y = h - padY - ((value - min) / span) * (h - padY * 2);
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x, y, 3.2, 0, Math.PI * 2);
          ctx.fill();
        });
      };

      drawSeries("gold", "#f5c542");
      drawSeries("silver", "#c0c0c0");

      chartTitle.textContent = selectedRangeDays + "-day trend (" + selectedQty + "g): Gold vs Silver";
    }

    function setLoading(loading) {
      isLoading = loading;
      skeleton.style.display = loading ? "grid" : "none";
      exportBtn.disabled = loading;
      retryBtn.disabled = loading;
    }

    function scheduleRefresh() {
      if (timer) clearInterval(timer);
      const mins = Number(refreshSelect.value) || 1;
      timer = setInterval(loadMetalPrices, mins * 60 * 1000);
    }

    function cacheKey(city) {
      return CACHE_PREFIX + city;
    }

    function trendKey(city) {
      return TREND_PREFIX + city;
    }

    function readCache(city) {
      try {
        const raw = localStorage.getItem(cacheKey(city));
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveCache(city, goldData, silverData) {
      try {
        localStorage.setItem(cacheKey(city), JSON.stringify({
          timestamp: Date.now(),
          goldData,
          silverData
        }));
      } catch {}
    }

    function readTrendStore(city) {
      try {
        const raw = localStorage.getItem(trendKey(city));
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveTrendStore(city, history) {
      try {
        localStorage.setItem(trendKey(city), JSON.stringify(history));
      } catch {}
    }

    function appendTrendSnapshot(city) {
      if (!latestGoldData || !latestSilverData) return;
      const today = new Date().toISOString().slice(0, 10);
      const g24 = metricForGrams((latestGoldData.metalMetrics || {}).gold24, selectedQty);
      const s = metricForGrams((latestSilverData.metalMetrics || {}).silver, selectedQty);
      if (!g24 || !s) return;

      const history = readTrendStore(city);
      const idx = history.findIndex((row) => row.date === today && row.qty === selectedQty);
      const snapshot = {
        date: today,
        qty: selectedQty,
        gold: Number(g24.todayPrice) || 0,
        silver: Number(s.todayPrice) || 0
      };
      if (idx >= 0) history[idx] = snapshot;
      else history.push(snapshot);

      const byQty = {};
      history.forEach((row) => {
        const k = String(row.qty);
        if (!byQty[k]) byQty[k] = [];
        byQty[k].push(row);
      });
      const trimmed = Object.keys(byQty).flatMap((k) =>
        byQty[k].sort((a, b) => a.date.localeCompare(b.date)).slice(-30)
      );
      saveTrendStore(city, trimmed);
    }

    function cityLabel(cityCode) {
      return (CITY_COORDS[cityCode] && CITY_COORDS[cityCode].label) || cityCode;
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const toRad = (n) => (n * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return 6371 * c;
    }

    function nearestSupportedCity(lat, lon) {
      let best = { city: selectedCity, distanceKm: Number.POSITIVE_INFINITY };
      Object.keys(CITY_COORDS).forEach((city) => {
        const ref = CITY_COORDS[city];
        const d = haversineKm(lat, lon, ref.lat, ref.lon);
        if (d < best.distanceKm) best = { city, distanceKm: d };
      });
      return best;
    }

    function detectCityByLocation(isManualClick) {
      if (!("geolocation" in navigator)) {
        statusEl.textContent = "Geolocation is not available in this browser.";
        return;
      }
      detectCityBtn.disabled = true;
      navigator.geolocation.getCurrentPosition((position) => {
        const { latitude, longitude } = position.coords;
        const nearest = nearestSupportedCity(latitude, longitude);
        if (nearest.distanceKm > 500) {
          statusEl.textContent = "Location found, but outside supported city range. Select city manually.";
          detectCityBtn.disabled = false;
          return;
        }
        selectedCity = nearest.city;
        citySelect.value = selectedCity;
        if (isManualClick) cityManuallySelected = true;
        statusEl.textContent = "Using nearest supported city: " + cityLabel(selectedCity);
        detectCityBtn.disabled = false;
        loadMetalPrices();
      }, () => {
        statusEl.textContent = "Could not detect location. You can still choose city manually.";
        detectCityBtn.disabled = false;
      }, { enableHighAccuracy: false, timeout: 7000, maximumAge: 10 * 60 * 1000 });
    }

    async function loadMetalPrices() {
      if (isLoading) return;
      setLoading(true);
      errorBox.style.display = "none";
      statusEl.textContent = "Loading " + citySelect.options[citySelect.selectedIndex].text + " prices...";

      try {
        const [goldResponse, silverResponse] = await Promise.all([
          fetch(endpoint("gold", selectedCity), { headers: { accept: "application/json, text/plain, */*" } }),
          fetch(endpoint("silver", selectedCity), { headers: { accept: "application/json, text/plain, */*" } })
        ]);
        if (!goldResponse.ok || !silverResponse.ok) throw new Error("Request failed");

        latestGoldData = await goldResponse.json();
        latestSilverData = await silverResponse.json();
        saveCache(selectedCity, latestGoldData, latestSilverData);
        appendTrendSnapshot(selectedCity);

        renderTableRows();
        const now = new Date();
        statusEl.textContent = "Live rates loaded for " + citySelect.options[citySelect.selectedIndex].text;
        metaEl.textContent = "Last updated: " + now.toLocaleTimeString() + " | Auto-refresh: every " + refreshSelect.value + " min";
      } catch (error) {
        const cached = readCache(selectedCity);
        if (cached && cached.goldData && cached.silverData) {
          latestGoldData = cached.goldData;
          latestSilverData = cached.silverData;
          renderTableRows();
          const cacheTime = new Date(cached.timestamp);
          statusEl.textContent = "Offline mode: showing cached rates for " + cityLabel(selectedCity) + ".";
          metaEl.textContent = "Last cache update: " + cacheTime.toLocaleString() + " | Auto-refresh: every " + refreshSelect.value + " min";
        } else {
          errorBox.style.display = "block";
          statusEl.textContent = "Could not load live rates.";
        }
      } finally {
        setLoading(false);
      }
    }

    function exportSummary() {
      if (!latestGoldData || !latestSilverData) return;
      const gm = latestGoldData.metalMetrics || {};
      const sm = latestSilverData.metalMetrics || {};
      const g24 = metricForGrams(gm.gold24, selectedQty);
      const g22 = metricForGrams(gm.gold22, selectedQty);
      const g18 = metricForGrams(gm.gold18, selectedQty);
      const s = metricForGrams(sm.silver, selectedQty);

      const text = [
        "Metal Prices (" + citySelect.options[citySelect.selectedIndex].text + ", " + selectedQty + "g)",
        "Gold 24k: " + money(g24 ? g24.todayPrice : null) + " (" + (g24 ? g24.deviationFromLastPrice : "NA") + ")",
        "Gold 22k: " + money(g22 ? g22.todayPrice : null) + " (" + (g22 ? g22.deviationFromLastPrice : "NA") + ")",
        "Gold 18k: " + money(g18 ? g18.todayPrice : null) + " (" + (g18 ? g18.deviationFromLastPrice : "NA") + ")",
        "Silver: " + money(s ? s.todayPrice : null) + " (" + (s ? s.deviationFromLastPrice : "NA") + ")"
      ].join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          statusEl.textContent = "Export copied to clipboard.";
        }).catch(() => {
          window.prompt("Copy this summary:", text);
        });
      } else {
        window.prompt("Copy this summary:", text);
      }
    }

    citySelect.addEventListener("change", () => {
      selectedCity = citySelect.value;
      cityManuallySelected = true;
      loadMetalPrices();
    });

    qtySelect.addEventListener("change", () => {
      selectedQty = Number(qtySelect.value) || 1;
      applyQtyFilter();
      appendTrendSnapshot(selectedCity);
      drawMiniTrend();
      metaEl.textContent = "Last updated: " + new Date().toLocaleTimeString() + " | Auto-refresh: every " + refreshSelect.value + " min";
    });

    refreshSelect.addEventListener("change", () => {
      scheduleRefresh();
      loadMetalPrices();
    });

    exportBtn.addEventListener("click", exportSummary);
    retryBtn.addEventListener("click", loadMetalPrices);
    detectCityBtn.addEventListener("click", () => detectCityByLocation(true));

    trend7Btn.addEventListener("click", () => {
      selectedRangeDays = 7;
      trend7Btn.classList.add("active");
      trend30Btn.classList.remove("active");
      drawMiniTrend();
    });

    trend30Btn.addEventListener("click", () => {
      selectedRangeDays = 30;
      trend30Btn.classList.add("active");
      trend7Btn.classList.remove("active");
      drawMiniTrend();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    scheduleRefresh();
    if (!cityManuallySelected) detectCityByLocation(false);
    loadMetalPrices();
  </script>
</body>
</html>
