<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Metal Prices Today</title>
  <style>
    :root {
      --bg: #000000;
      --card: #0f0f10;
      --text: #f4f4f5;
      --accent: #f5c542;
      --border: #262628;
      --muted: #c9c9d2;
      --muted-2: #9fa0ad;
      --surface-2: #131316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .page-grid {
      display: grid;
      grid-template-columns: minmax(340px, 760px) minmax(220px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: 0.2px;
    }
    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.92rem;
    }
    #status {
      margin-top: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    #meta {
      margin-top: 4px;
      font-size: 0.8rem;
      color: var(--muted-2);
    }
    .toolbar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .field {
      display: grid;
      gap: 4px;
    }
    .field label {
      color: #d7d7de;
      font-size: 0.8rem;
    }
    select, button, input[type="checkbox"] {
      font: inherit;
    }
    select {
      background: var(--surface-2);
      color: #ffffff;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 7px 8px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    select:focus {
      border-color: #4b5563;
      box-shadow: 0 0 0 2px rgba(245, 197, 66, 0.18);
    }
    .action-btn {
      background: #f9fafb;
      color: #101113;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .action-btn:hover { filter: brightness(0.96); }
    .action-btn:active { transform: translateY(1px); }
    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .metal-section {
      margin-top: 16px;
    }
    .metal-title {
      margin: 0 0 6px;
      font-size: 0;
      line-height: 1;
    }
    .metal-icon {
      display: inline-block;
      width: 46px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2);
      position: relative;
    }
    .metal-icon::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 6px;
      height: 2px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.45);
    }
    .gold-biscuit { background: linear-gradient(180deg, #f6d365 0%, #d8a323 100%); }
    .silver-biscuit {
      background: linear-gradient(180deg, #e8ebf0 0%, #9ea7b5 100%);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 9px;
      font-size: 0.92rem;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 8px 6px;
    }
    th {
      color: #ffffff;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      background: #111214;
    }
    tbody tr:hover {
      background: #121317;
    }
    .delta-up { color: #4ade80; font-weight: 600; }
    .delta-down { color: #f87171; font-weight: 600; }
    .delta-flat { color: #a3a3a3; font-weight: 600; }
    .chart-wrap {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: var(--surface-2);
    }
    .chart-title {
      margin: 0 0 8px;
      font-size: 0.9rem;
      color: #d8d8df;
    }
    #trendChart {
      width: 100%;
      height: 120px;
      display: block;
      background: #0c0c0d;
      border-radius: 8px;
    }
    .error-box {
      margin-top: 12px;
      border: 1px solid #7f1d1d;
      background: rgba(127, 29, 29, 0.2);
      color: #fecaca;
      border-radius: 8px;
      padding: 10px;
      display: none;
    }
    .skeleton {
      margin-top: 12px;
      display: none;
      gap: 8px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, #1a1a1c 0%, #2a2a2d 50%, #1a1a1c 100%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (max-width: 980px) {
      .page-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-grid">
    <main class="card">
      <div class="top-row">
        <h1>Bangalore Metal Rates</h1>
        <a class="back-link" href="./index.html">Back</a>
      </div>
      <div id="status">Loading...</div>
      <div id="meta">Last updated: --</div>

      <div class="toolbar">
        <div class="field">
          <label for="citySelect">City</label>
          <select id="citySelect">
            <option value="bangalore" selected>Bangalore</option>
            <option value="mumbai">Mumbai</option>
            <option value="chennai">Chennai</option>
            <option value="delhi">Delhi</option>
            <option value="hyderabad">Hyderabad</option>
          </select>
        </div>
        <div class="field">
          <label for="qtySelect">Quantity</label>
          <select id="qtySelect">
            <option value="1" selected>1g</option>
            <option value="8">8g</option>
            <option value="10">10g</option>
            <option value="100">100g</option>
          </select>
        </div>
        <div class="field">
          <label for="refreshSelect">Auto-refresh</label>
          <select id="refreshSelect">
            <option value="1" selected>1 min</option>
            <option value="2">2 min</option>
            <option value="3">3 min</option>
            <option value="4">4 min</option>
            <option value="5">5 min</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="action-btn" id="exportBtn">Copy to Clipboard</button>
        </div>
      </div>

      <div class="error-box" id="errorBox">
        Could not load live rates.
        <button class="action-btn" id="retryBtn" type="button">Retry</button>
      </div>

      <div class="skeleton" id="skeleton">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>

      <section id="goldSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-icon gold-biscuit" aria-hidden="true"></span><span class="sr-only">Gold</span></h2>
        <table id="goldTable">
          <thead>
            <tr>
              <th>Karat</th>
              <th>Today (INR)</th>
              <th class="yesterday-col">Yesterday (INR)</th>
              <th class="delta-col">Change vs yesterday</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="silverSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-icon silver-biscuit" aria-hidden="true"></span><span class="sr-only">Silver</span></h2>
        <table id="silverTable">
          <thead>
            <tr>
              <th>Type</th>
              <th>Today (INR)</th>
              <th class="yesterday-col">Yesterday (INR)</th>
              <th class="delta-col">Change vs yesterday</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <div class="chart-wrap">
        <p class="chart-title" id="chartTitle">Mini trend (selected qty)</p>
        <canvas id="trendChart" width="700" height="120"></canvas>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://services.timesofindia.com/ufs-utility/utility/metals/get/widget/data?pc=toi&pfm=web&client=toi&fv=1000";
    const GRAMS = [1, 8, 10, 100];

    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const citySelect = document.getElementById("citySelect");
    const qtySelect = document.getElementById("qtySelect");
    const refreshSelect = document.getElementById("refreshSelect");
    const exportBtn = document.getElementById("exportBtn");
    const retryBtn = document.getElementById("retryBtn");
    const errorBox = document.getElementById("errorBox");
    const skeleton = document.getElementById("skeleton");
    const goldSection = document.getElementById("goldSection");
    const silverSection = document.getElementById("silverSection");
    const goldTbody = document.querySelector("#goldTable tbody");
    const silverTbody = document.querySelector("#silverTable tbody");
    const chartTitle = document.getElementById("chartTitle");
    const chartCanvas = document.getElementById("trendChart");

    let timer = null;
    let isLoading = false;
    let selectedQty = 1;
    let selectedCity = "bangalore";
    let latestGoldData = null;
    let latestSilverData = null;

    function endpoint(metal, city) {
      return API_BASE + "&metal=" + metal + "&city=" + encodeURIComponent(city);
    }

    function metricForGrams(metricList, grams) {
      if (!Array.isArray(metricList)) return null;
      return metricList.find((row) => row.quantityInGrams === grams) || null;
    }

    function money(value) {
      if (value == null) return "Not available";
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0
      }).format(value);
    }

    function deltaHtml(value) {
      if (value == null) return "Not available";
      if (value > 0) return '<span class="delta-up">▲ +' + money(value) + "</span>";
      if (value < 0) return '<span class="delta-down">▼ -' + money(Math.abs(value)) + "</span>";
      return '<span class="delta-flat">■ ' + money(0) + "</span>";
    }

    function renderTableRows() {
      if (!latestGoldData || !latestSilverData) return;
      const goldMetrics = latestGoldData.metalMetrics || {};
      const silverMetrics = latestSilverData.metalMetrics || {};

      const goldRows = [
        ["24k", goldMetrics.gold24],
        ["22k", goldMetrics.gold22],
        ["18k", goldMetrics.gold18]
      ];

      goldTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        goldRows.forEach(([label, metrics]) => {
          const row = metricForGrams(metrics, g);
          const tr = document.createElement("tr");
          tr.dataset.qty = String(g);
          tr.innerHTML =
            "<td>" + label + " (" + g + "g)</td>" +
            "<td>" + money(row ? row.todayPrice : null) + "</td>" +
            '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
            '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
          goldTbody.appendChild(tr);
        });
      });

      silverTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        const row = metricForGrams(silverMetrics.silver, g);
        const tr = document.createElement("tr");
        tr.dataset.qty = String(g);
        tr.innerHTML =
          "<td>Silver (" + g + "g)</td>" +
          "<td>" + money(row ? row.todayPrice : null) + "</td>" +
          '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
          '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
        silverTbody.appendChild(tr);
      });

      applyQtyFilter();
      drawMiniTrend();
      goldSection.hidden = false;
      silverSection.hidden = false;
    }

    function applyQtyFilter() {
      document.querySelectorAll("tbody tr").forEach((tr) => {
        tr.style.display = tr.dataset.qty === String(selectedQty) ? "" : "none";
      });
    }

    function drawMiniTrend() {
      const ctx = chartCanvas.getContext("2d");
      if (!ctx || !latestGoldData || !latestSilverData) return;

      const gold24 = metricForGrams((latestGoldData.metalMetrics || {}).gold24, selectedQty);
      const silver = metricForGrams((latestSilverData.metalMetrics || {}).silver, selectedQty);
      const points = [
        { label: "Gold-Y", value: gold24 ? gold24.yesterdayPrice : 0, color: "#a1a1aa" },
        { label: "Gold-T", value: gold24 ? gold24.todayPrice : 0, color: "#f5c542" },
        { label: "Silver-Y", value: silver ? silver.yesterdayPrice : 0, color: "#7f8ea3" },
        { label: "Silver-T", value: silver ? silver.todayPrice : 0, color: "#c0c0c0" }
      ];

      const w = chartCanvas.width;
      const h = chartCanvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0c0c0d";
      ctx.fillRect(0, 0, w, h);

      const vals = points.map((p) => p.value);
      const min = Math.min(...vals, 0);
      const max = Math.max(...vals, 1);
      const span = Math.max(max - min, 1);
      const padX = 28;
      const padY = 16;
      const step = (w - padX * 2) / (points.length - 1);

      ctx.strokeStyle = "#2a2a2f";
      ctx.beginPath();
      ctx.moveTo(padX, h - padY);
      ctx.lineTo(w - padX, h - padY);
      ctx.stroke();

      ctx.lineWidth = 2;
      for (let i = 1; i < points.length; i += 2) {
        const p1 = points[i - 1];
        const p2 = points[i];
        const x1 = padX + (i - 1) * step;
        const x2 = padX + i * step;
        const y1 = h - padY - ((p1.value - min) / span) * (h - padY * 2);
        const y2 = h - padY - ((p2.value - min) / span) * (h - padY * 2);
        ctx.strokeStyle = p2.color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      points.forEach((p, i) => {
        const x = padX + i * step;
        const y = h - padY - ((p.value - min) / span) * (h - padY * 2);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      chartTitle.textContent = "Mini trend (" + selectedQty + "g): Yesterday vs Today";
    }

    function setLoading(loading) {
      isLoading = loading;
      skeleton.style.display = loading ? "grid" : "none";
      exportBtn.disabled = loading;
      retryBtn.disabled = loading;
    }

    function scheduleRefresh() {
      if (timer) clearInterval(timer);
      const mins = Number(refreshSelect.value) || 1;
      timer = setInterval(loadMetalPrices, mins * 60 * 1000);
    }

    async function loadMetalPrices() {
      if (isLoading) return;
      setLoading(true);
      errorBox.style.display = "none";
      statusEl.textContent = "Loading " + citySelect.options[citySelect.selectedIndex].text + " prices...";

      try {
        const [goldResponse, silverResponse] = await Promise.all([
          fetch(endpoint("gold", selectedCity), { headers: { accept: "application/json, text/plain, */*" } }),
          fetch(endpoint("silver", selectedCity), { headers: { accept: "application/json, text/plain, */*" } })
        ]);
        if (!goldResponse.ok || !silverResponse.ok) throw new Error("Request failed");

        latestGoldData = await goldResponse.json();
        latestSilverData = await silverResponse.json();

        renderTableRows();
        const now = new Date();
        statusEl.textContent = "Live rates loaded for " + citySelect.options[citySelect.selectedIndex].text;
        metaEl.textContent = "Last updated: " + now.toLocaleTimeString() + " | Auto-refresh: every " + refreshSelect.value + " min";
      } catch (error) {
        errorBox.style.display = "block";
        statusEl.textContent = "Could not load live rates.";
      } finally {
        setLoading(false);
      }
    }

    function exportSummary() {
      if (!latestGoldData || !latestSilverData) return;
      const gm = latestGoldData.metalMetrics || {};
      const sm = latestSilverData.metalMetrics || {};
      const g24 = metricForGrams(gm.gold24, selectedQty);
      const g22 = metricForGrams(gm.gold22, selectedQty);
      const g18 = metricForGrams(gm.gold18, selectedQty);
      const s = metricForGrams(sm.silver, selectedQty);

      const text = [
        "Metal Prices (" + citySelect.options[citySelect.selectedIndex].text + ", " + selectedQty + "g)",
        "Gold 24k: " + money(g24 ? g24.todayPrice : null) + " (" + (g24 ? g24.deviationFromLastPrice : "NA") + ")",
        "Gold 22k: " + money(g22 ? g22.todayPrice : null) + " (" + (g22 ? g22.deviationFromLastPrice : "NA") + ")",
        "Gold 18k: " + money(g18 ? g18.todayPrice : null) + " (" + (g18 ? g18.deviationFromLastPrice : "NA") + ")",
        "Silver: " + money(s ? s.todayPrice : null) + " (" + (s ? s.deviationFromLastPrice : "NA") + ")"
      ].join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          statusEl.textContent = "Export copied to clipboard.";
        }).catch(() => {
          window.prompt("Copy this summary:", text);
        });
      } else {
        window.prompt("Copy this summary:", text);
      }
    }

    citySelect.addEventListener("change", () => {
      selectedCity = citySelect.value;
      loadMetalPrices();
    });

    qtySelect.addEventListener("change", () => {
      selectedQty = Number(qtySelect.value) || 1;
      applyQtyFilter();
      drawMiniTrend();
      metaEl.textContent = "Last updated: " + new Date().toLocaleTimeString() + " | Auto-refresh: every " + refreshSelect.value + " min";
    });

    refreshSelect.addEventListener("change", () => {
      scheduleRefresh();
      loadMetalPrices();
    });

    exportBtn.addEventListener("click", exportSummary);
    retryBtn.addEventListener("click", loadMetalPrices);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    scheduleRefresh();
    loadMetalPrices();
  </script>
</body>
</html>
