<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Live gold and silver prices by city in India with quantity filters, auto-refresh, and cache fallback.">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Metal Prices Today">
  <meta property="og:description" content="Track live metal rates with city, quantity, and auto-refresh options.">
  <meta property="og:url" content="./metals.html">
  <meta property="og:site_name" content="Metal Prices">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Metal Prices Today">
  <meta name="twitter:description" content="Live gold and silver rates with city, quantity, and auto-refresh filters.">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Metal Prices Today</title>
  <style>
    :root {
      --bg: #000000;
      --card: #0f0f10;
      --text: #f4f4f5;
      --accent: #f5c542;
      --border: #262628;
      --muted: #c9c9d2;
      --muted-2: #9fa0ad;
      --surface-2: #131316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .page-grid {
      display: grid;
      grid-template-columns: minmax(340px, 760px) minmax(220px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: 0.2px;
    }
    .back-link {
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.92rem;
    }
    #status {
      margin-top: 14px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    #meta {
      margin-top: 4px;
      font-size: 0.8rem;
      color: var(--muted-2);
    }
    .toolbar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .field {
      min-width: 0;
    }
    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field { display: grid; gap: 4px; }
    .field label {
      color: #d7d7de;
      font-size: 0.8rem;
    }
    select, button, input[type="checkbox"] {
      font: inherit;
    }
    select {
      width: 100%;
      background: var(--surface-2);
      color: #ffffff;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 7px 8px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    select:focus {
      border-color: #4b5563;
      box-shadow: 0 0 0 2px rgba(245, 197, 66, 0.18);
    }
    .action-btn {
      background: #f9fafb;
      color: #101113;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .action-btn:hover { filter: brightness(0.96); }
    .action-btn:active { transform: translateY(1px); }
    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .metal-section {
      margin-top: 16px;
    }
    .metal-title {
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .metal-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.4px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      position: relative;
      flex: 0 0 auto;
    }
    .metal-badge::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 7px;
      right: 7px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      pointer-events: none;
    }
    .metal-badge span {
      position: relative;
      z-index: 1;
    }
    .gold-badge {
      color: #2b2100;
      background: radial-gradient(circle at 28% 26%, #ffe9a0 0%, #f5c542 44%, #b27d0f 100%);
      box-shadow: 0 2px 10px rgba(245, 197, 66, 0.28);
    }
    .silver-badge {
      color: #1a1e27;
      background: radial-gradient(circle at 28% 26%, #f6f7fb 0%, #c5ccd8 48%, #7f8a9b 100%);
      box-shadow: 0 2px 10px rgba(149, 158, 172, 0.24);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 9px;
      font-size: 0.92rem;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 8px 6px;
    }
    th {
      color: #ffffff;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      background: #111214;
    }
    tbody tr:hover {
      background: #121317;
    }
    .delta-up { color: #4ade80; font-weight: 600; }
    .delta-down { color: #f87171; font-weight: 600; }
    .delta-flat { color: #a3a3a3; font-weight: 600; }
    .error-box {
      margin-top: 12px;
      border: 1px solid #7f1d1d;
      background: rgba(127, 29, 29, 0.2);
      color: #fecaca;
      border-radius: 8px;
      padding: 10px;
      display: none;
    }
    .skeleton {
      margin-top: 12px;
      display: none;
      gap: 8px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 8px;
      background: linear-gradient(90deg, #1a1a1c 0%, #2a2a2d 50%, #1a1a1c 100%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (max-width: 980px) {
      .page-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body {
        padding: 12px;
      }
      .card {
        padding: 14px;
      }
      .top-row {
        flex-wrap: wrap;
      }
      .toolbar {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 10px;
      }
      .toolbar-actions {
        width: 100%;
      }
      .toolbar-actions .action-btn {
        flex: 1 1 100%;
      }
      th, td {
        padding: 8px 5px;
        font-size: 0.84rem;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1.1rem;
      }
      .toolbar {
        grid-template-columns: 1fr;
      }
      .yesterday-col,
      .delta-col {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-grid">
    <main class="card">
      <div class="top-row">
        <h1>Metal Rates</h1>
        <a class="back-link" href="./index.html">Back</a>
      </div>
      <div id="status">Loading...</div>
      <div id="meta">Last updated: --</div>

      <div class="toolbar">
        <div class="field">
          <label for="citySelect">City</label>
          <select id="citySelect">
            <option value="bangalore" selected>Bangalore</option>
            <option value="mumbai">Mumbai</option>
            <option value="chennai">Chennai</option>
            <option value="delhi">Delhi</option>
            <option value="hyderabad">Hyderabad</option>
          </select>
        </div>
        <div class="field">
          <label for="qtySelect">Quantity</label>
          <select id="qtySelect">
            <option value="1" selected>1g</option>
            <option value="8">8g</option>
            <option value="10">10g</option>
            <option value="100">100g</option>
          </select>
        </div>
        <div class="field">
          <label for="refreshSelect">Auto-refresh</label>
          <select id="refreshSelect">
            <option value="1" selected>1 min</option>
            <option value="2">2 min</option>
            <option value="3">3 min</option>
            <option value="4">4 min</option>
            <option value="5">5 min</option>
          </select>
        </div>
        <div class="field">
          <label for="serverSelect">Server</label>
          <select id="serverSelect">
            <option value="server1" selected>Server 1 (Times)</option>
            <option value="server2">Server 2 (Metals-API)</option>
            <option value="server3">Server 3 (GoldAPI)</option>
            <option value="server4">Server 4 (MetalpriceAPI)</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="toolbar-actions">
            <button class="action-btn" id="detectCityBtn" type="button">Use My Location</button>
            <button class="action-btn" id="exportBtn" type="button">Copy to Clipboard</button>
          </div>
        </div>
      </div>

      <div class="error-box" id="errorBox">
        Could not load live rates.
        <button class="action-btn" id="retryBtn" type="button">Retry</button>
      </div>

      <div class="skeleton" id="skeleton">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>

      <section id="goldSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-badge gold-badge" aria-hidden="true"><span>AU</span></span>Gold</h2>
        <div class="table-wrap">
          <table id="goldTable">
            <thead>
              <tr>
                <th>Karat</th>
                <th>Today (INR)</th>
                <th class="yesterday-col">Yesterday (INR)</th>
                <th class="delta-col">Change vs yesterday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="silverSection" class="metal-section" hidden>
        <h2 class="metal-title"><span class="metal-badge silver-badge" aria-hidden="true"><span>AG</span></span>Silver</h2>
        <div class="table-wrap">
          <table id="silverTable">
            <thead>
              <tr>
                <th>Type</th>
                <th>Today (INR)</th>
                <th class="yesterday-col">Yesterday (INR)</th>
                <th class="delta-col">Change vs yesterday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script>
    const API_BASE = "https://services.timesofindia.com/ufs-utility/utility/metals/get/widget/data?pc=toi&pfm=web&client=toi&fv=1000";
    const GRAMS = [1, 8, 10, 100];

    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const citySelect = document.getElementById("citySelect");
    const qtySelect = document.getElementById("qtySelect");
    const refreshSelect = document.getElementById("refreshSelect");
    const serverSelect = document.getElementById("serverSelect");
    const exportBtn = document.getElementById("exportBtn");
    const retryBtn = document.getElementById("retryBtn");
    const detectCityBtn = document.getElementById("detectCityBtn");
    const errorBox = document.getElementById("errorBox");
    const skeleton = document.getElementById("skeleton");
    const goldSection = document.getElementById("goldSection");
    const silverSection = document.getElementById("silverSection");
    const goldTbody = document.querySelector("#goldTable tbody");
    const silverTbody = document.querySelector("#silverTable tbody");

    let timer = null;
    let isLoading = false;
    let selectedQty = 1;
    let selectedCity = "bangalore";
    let selectedServer = "server1";
    let cityManuallySelected = false;
    let latestGoldData = null;
    let latestSilverData = null;
    const CACHE_PREFIX = "metal-rates-cache-v1:";
    const CITY_COORDS = {
      bangalore: { lat: 12.9716, lon: 77.5946, label: "Bangalore" },
      mumbai: { lat: 19.0760, lon: 72.8777, label: "Mumbai" },
      chennai: { lat: 13.0827, lon: 80.2707, label: "Chennai" },
      delhi: { lat: 28.6139, lon: 77.2090, label: "Delhi" },
      hyderabad: { lat: 17.3850, lon: 78.4867, label: "Hyderabad" }
    };
    const OUNCE_TO_GRAM = 31.1034768;

    function endpoint(metal, city) {
      return API_BASE + "&metal=" + metal + "&city=" + encodeURIComponent(city);
    }

    function serverLabel(server) {
      if (server === "server1") return "Server 1 (Times)";
      if (server === "server2") return "Server 2 (Metals-API)";
      if (server === "server3") return "Server 3 (GoldAPI)";
      if (server === "server4") return "Server 4 (MetalpriceAPI)";
      return "Server";
    }

    function metricForGrams(metricList, grams) {
      if (!Array.isArray(metricList)) return null;
      return metricList.find((row) => row.quantityInGrams === grams) || null;
    }

    function money(value) {
      if (value == null) return "Not available";
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0
      }).format(value);
    }

    function deltaHtml(value) {
      if (value == null) return "Not available";
      if (value > 0) return '<span class="delta-up">▲ +' + money(value) + "</span>";
      if (value < 0) return '<span class="delta-down">▼ -' + money(Math.abs(value)) + "</span>";
      return '<span class="delta-flat">■ ' + money(0) + "</span>";
    }

    function renderTableRows() {
      if (!latestGoldData || !latestSilverData) return;
      const goldMetrics = latestGoldData.metalMetrics || {};
      const silverMetrics = latestSilverData.metalMetrics || {};

      const goldRows = [
        ["24k", goldMetrics.gold24],
        ["22k", goldMetrics.gold22],
        ["18k", goldMetrics.gold18]
      ];

      goldTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        goldRows.forEach(([label, metrics]) => {
          const row = metricForGrams(metrics, g);
          const tr = document.createElement("tr");
          tr.dataset.qty = String(g);
          tr.innerHTML =
            "<td>" + label + " (" + g + "g)</td>" +
            "<td>" + money(row ? row.todayPrice : null) + "</td>" +
            '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
            '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
          goldTbody.appendChild(tr);
        });
      });

      silverTbody.innerHTML = "";
      GRAMS.forEach((g) => {
        const row = metricForGrams(silverMetrics.silver, g);
        const tr = document.createElement("tr");
        tr.dataset.qty = String(g);
        tr.innerHTML =
          "<td>Silver (" + g + "g)</td>" +
          "<td>" + money(row ? row.todayPrice : null) + "</td>" +
          '<td class="yesterday-col">' + money(row ? row.yesterdayPrice : null) + "</td>" +
          '<td class="delta-col">' + deltaHtml(row ? row.deviationFromLastPrice : null) + "</td>";
        silverTbody.appendChild(tr);
      });

      applyQtyFilter();
      goldSection.hidden = false;
      silverSection.hidden = false;
    }

    function applyQtyFilter() {
      document.querySelectorAll("tbody tr").forEach((tr) => {
        tr.style.display = tr.dataset.qty === String(selectedQty) ? "" : "none";
      });
    }

    function setLoading(loading) {
      isLoading = loading;
      skeleton.style.display = loading ? "grid" : "none";
      exportBtn.disabled = loading;
      retryBtn.disabled = loading;
      serverSelect.disabled = loading;
    }

    function scheduleRefresh() {
      if (timer) clearInterval(timer);
      const mins = Number(refreshSelect.value) || 1;
      timer = setInterval(loadMetalPrices, mins * 60 * 1000);
    }

    function cacheKey(city) {
      return CACHE_PREFIX + city;
    }

    function readCache(city) {
      try {
        const raw = localStorage.getItem(cacheKey(city));
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveCache(city, goldData, silverData) {
      try {
        localStorage.setItem(cacheKey(city), JSON.stringify({
          timestamp: Date.now(),
          goldData,
          silverData
        }));
      } catch {}
    }

    function cityLabel(cityCode) {
      return (CITY_COORDS[cityCode] && CITY_COORDS[cityCode].label) || cityCode;
    }

    function readApiKey(name) {
      try {
        const fromStorage = localStorage.getItem(name);
        if (fromStorage) return fromStorage;
      } catch {}
      if (typeof window !== "undefined" && window[name]) return window[name];
      return "";
    }

    function metricRowsFromPerGram(perGram, yesterdayPerGram) {
      return GRAMS.map((g) => ({
        quantityInGrams: g,
        todayPrice: Math.round(perGram * g),
        yesterdayPrice: Math.round(yesterdayPerGram * g),
        deviationFromLastPrice: Math.round((perGram - yesterdayPerGram) * g)
      }));
    }

    function toTimesShapeFromPerGram(gold24PerGram, silverPerGram, gold24Yesterday, silverYesterday) {
      const g24 = metricRowsFromPerGram(gold24PerGram, gold24Yesterday);
      const goldData = {
        metalMetrics: {
          gold24: g24,
          gold22: g24.map((r) => ({
            quantityInGrams: r.quantityInGrams,
            todayPrice: Math.round(r.todayPrice * (22 / 24)),
            yesterdayPrice: Math.round(r.yesterdayPrice * (22 / 24)),
            deviationFromLastPrice: Math.round(r.deviationFromLastPrice * (22 / 24))
          })),
          gold18: g24.map((r) => ({
            quantityInGrams: r.quantityInGrams,
            todayPrice: Math.round(r.todayPrice * (18 / 24)),
            yesterdayPrice: Math.round(r.yesterdayPrice * (18 / 24)),
            deviationFromLastPrice: Math.round(r.deviationFromLastPrice * (18 / 24))
          }))
        }
      };
      const silverData = {
        metalMetrics: {
          silver: metricRowsFromPerGram(silverPerGram, silverYesterday)
        }
      };
      return { goldData, silverData };
    }

    async function loadFromServer1() {
      const [goldResponse, silverResponse] = await Promise.all([
        fetch(endpoint("gold", selectedCity), { headers: { accept: "application/json, text/plain, */*" } }),
        fetch(endpoint("silver", selectedCity), { headers: { accept: "application/json, text/plain, */*" } })
      ]);
      if (!goldResponse.ok || !silverResponse.ok) throw new Error("Request failed");
      return {
        goldData: await goldResponse.json(),
        silverData: await silverResponse.json()
      };
    }

    async function loadFromServer2() {
      const apiKey = readApiKey("METALS_API_KEY");
      if (!apiKey) throw new Error("Server 2 key missing. Set localStorage METALS_API_KEY.");
      const url = "https://api.metals-api.com/v1/latest?access_key=" + encodeURIComponent(apiKey) + "&base=INR&symbols=XAU,XAG";
      const response = await fetch(url);
      if (!response.ok) throw new Error("Server 2 request failed");
      const payload = await response.json();
      if (!payload || !payload.rates || !payload.rates.XAU || !payload.rates.XAG) {
        throw new Error("Server 2 returned unexpected data");
      }
      const gold24PerGram = (1 / Number(payload.rates.XAU)) / OUNCE_TO_GRAM;
      const silverPerGram = (1 / Number(payload.rates.XAG)) / OUNCE_TO_GRAM;
      return toTimesShapeFromPerGram(gold24PerGram, silverPerGram, gold24PerGram, silverPerGram);
    }

    async function loadFromServer3() {
      const apiKey = readApiKey("GOLDAPI_KEY");
      if (!apiKey) throw new Error("Server 3 key missing. Set localStorage GOLDAPI_KEY.");
      const headers = { "x-access-token": apiKey };
      const [goldResp, silverResp] = await Promise.all([
        fetch("https://www.goldapi.io/api/XAU/INR", { headers }),
        fetch("https://www.goldapi.io/api/XAG/INR", { headers })
      ]);
      if (!goldResp.ok || !silverResp.ok) throw new Error("Server 3 request failed");
      const gold = await goldResp.json();
      const silver = await silverResp.json();
      const gold24PerGram = Number(gold.price_gram_24k || (gold.price / OUNCE_TO_GRAM));
      const silverPerGram = Number(silver.price_gram_24k || (silver.price / OUNCE_TO_GRAM));
      const gold24Yesterday = Number(gold.prev_close_price ? gold.prev_close_price / OUNCE_TO_GRAM : gold24PerGram);
      const silverYesterday = Number(silver.prev_close_price ? silver.prev_close_price / OUNCE_TO_GRAM : silverPerGram);
      if (!gold24PerGram || !silverPerGram) throw new Error("Server 3 returned unexpected data");
      return toTimesShapeFromPerGram(gold24PerGram, silverPerGram, gold24Yesterday, silverYesterday);
    }

    async function loadFromServer4() {
      const apiKey = readApiKey("METALPRICEAPI_KEY");
      if (!apiKey) throw new Error("Server 4 key missing. Set localStorage METALPRICEAPI_KEY.");
      const response = await fetch("https://api.metalpriceapi.com/v1/latest?api_key=" + encodeURIComponent(apiKey) + "&base=INR&currencies=XAU,XAG");
      if (!response.ok) throw new Error("Server 4 request failed");
      const payload = await response.json();
      const rates = payload && payload.rates ? payload.rates : null;
      if (!rates || !rates.XAU || !rates.XAG) throw new Error("Server 4 returned unexpected data");
      const gold24PerGram = (1 / Number(rates.XAU)) / OUNCE_TO_GRAM;
      const silverPerGram = (1 / Number(rates.XAG)) / OUNCE_TO_GRAM;
      return toTimesShapeFromPerGram(gold24PerGram, silverPerGram, gold24PerGram, silverPerGram);
    }

    async function loadFromSelectedServer() {
      if (selectedServer === "server1") return loadFromServer1();
      if (selectedServer === "server2") return loadFromServer2();
      if (selectedServer === "server3") return loadFromServer3();
      if (selectedServer === "server4") return loadFromServer4();
      throw new Error("Unknown server");
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const toRad = (n) => (n * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return 6371 * c;
    }

    function nearestSupportedCity(lat, lon) {
      let best = { city: selectedCity, distanceKm: Number.POSITIVE_INFINITY };
      Object.keys(CITY_COORDS).forEach((city) => {
        const ref = CITY_COORDS[city];
        const d = haversineKm(lat, lon, ref.lat, ref.lon);
        if (d < best.distanceKm) best = { city, distanceKm: d };
      });
      return best;
    }

    function detectCityByLocation(isManualClick) {
      if (!("geolocation" in navigator)) {
        statusEl.textContent = "Geolocation is not available in this browser.";
        return;
      }
      detectCityBtn.disabled = true;
      navigator.geolocation.getCurrentPosition((position) => {
        const { latitude, longitude } = position.coords;
        const nearest = nearestSupportedCity(latitude, longitude);
        if (nearest.distanceKm > 500) {
          statusEl.textContent = "Location found, but outside supported city range. Select city manually.";
          detectCityBtn.disabled = false;
          return;
        }
        selectedCity = nearest.city;
        citySelect.value = selectedCity;
        if (isManualClick) cityManuallySelected = true;
        statusEl.textContent = "Using nearest supported city: " + cityLabel(selectedCity);
        detectCityBtn.disabled = false;
        loadMetalPrices();
      }, () => {
        statusEl.textContent = "Could not detect location. You can still choose city manually.";
        detectCityBtn.disabled = false;
      }, { enableHighAccuracy: false, timeout: 7000, maximumAge: 10 * 60 * 1000 });
    }

    async function loadMetalPrices() {
      if (isLoading) return;
      setLoading(true);
      errorBox.style.display = "none";
      statusEl.textContent = "Loading " + citySelect.options[citySelect.selectedIndex].text + " prices (" + serverLabel(selectedServer) + ")...";

      try {
        const serverData = await loadFromSelectedServer();
        latestGoldData = serverData.goldData;
        latestSilverData = serverData.silverData;
        saveCache(selectedCity, latestGoldData, latestSilverData);

        renderTableRows();
        const now = new Date();
        statusEl.textContent = "Live rates loaded for " + citySelect.options[citySelect.selectedIndex].text + " via " + serverLabel(selectedServer);
        metaEl.textContent = "Last updated: " + now.toLocaleTimeString() + " | Server: " + serverLabel(selectedServer) + " | Auto-refresh: every " + refreshSelect.value + " min";
      } catch (error) {
        const cached = readCache(selectedCity);
        if (cached && cached.goldData && cached.silverData) {
          latestGoldData = cached.goldData;
          latestSilverData = cached.silverData;
          renderTableRows();
          const cacheTime = new Date(cached.timestamp);
          statusEl.textContent = "Offline mode: showing cached rates for " + cityLabel(selectedCity) + ".";
          metaEl.textContent = "Last cache update: " + cacheTime.toLocaleString() + " | Server: " + serverLabel(selectedServer) + " | Auto-refresh: every " + refreshSelect.value + " min";
        } else {
          errorBox.style.display = "block";
          statusEl.textContent = "Could not load live rates (" + serverLabel(selectedServer) + ").";
        }
      } finally {
        setLoading(false);
      }
    }

    function exportSummary() {
      if (!latestGoldData || !latestSilverData) return;
      const gm = latestGoldData.metalMetrics || {};
      const sm = latestSilverData.metalMetrics || {};
      const g24 = metricForGrams(gm.gold24, selectedQty);
      const g22 = metricForGrams(gm.gold22, selectedQty);
      const g18 = metricForGrams(gm.gold18, selectedQty);
      const s = metricForGrams(sm.silver, selectedQty);

      const text = [
        "Metal Prices (" + citySelect.options[citySelect.selectedIndex].text + ", " + selectedQty + "g)",
        "Gold 24k: " + money(g24 ? g24.todayPrice : null) + " (" + (g24 ? g24.deviationFromLastPrice : "NA") + ")",
        "Gold 22k: " + money(g22 ? g22.todayPrice : null) + " (" + (g22 ? g22.deviationFromLastPrice : "NA") + ")",
        "Gold 18k: " + money(g18 ? g18.todayPrice : null) + " (" + (g18 ? g18.deviationFromLastPrice : "NA") + ")",
        "Silver: " + money(s ? s.todayPrice : null) + " (" + (s ? s.deviationFromLastPrice : "NA") + ")"
      ].join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          statusEl.textContent = "Export copied to clipboard.";
        }).catch(() => {
          window.prompt("Copy this summary:", text);
        });
      } else {
        window.prompt("Copy this summary:", text);
      }
    }

    citySelect.addEventListener("change", () => {
      selectedCity = citySelect.value;
      cityManuallySelected = true;
      loadMetalPrices();
    });

    qtySelect.addEventListener("change", () => {
      selectedQty = Number(qtySelect.value) || 1;
      applyQtyFilter();
      metaEl.textContent = "Last updated: " + new Date().toLocaleTimeString() + " | Server: " + serverLabel(selectedServer) + " | Auto-refresh: every " + refreshSelect.value + " min";
    });

    refreshSelect.addEventListener("change", () => {
      scheduleRefresh();
      loadMetalPrices();
    });
    serverSelect.addEventListener("change", () => {
      selectedServer = serverSelect.value;
      loadMetalPrices();
    });

    exportBtn.addEventListener("click", exportSummary);
    retryBtn.addEventListener("click", loadMetalPrices);
    detectCityBtn.addEventListener("click", () => detectCityByLocation(true));

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    scheduleRefresh();
    if (!cityManuallySelected) detectCityByLocation(false);
    loadMetalPrices();
  </script>
</body>
</html>
