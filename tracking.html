<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>COC Tracking</title>
  <style>
    :root {
      --bg: #000000;
      --card: #0f0f10;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #ffffff;
      --border: #262628;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 1.2rem;
    }
    .back-link {
      color: #f5c542;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
    }
    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .form {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
    }
    input {
      background: #151518;
      color: #fff;
      border: 1px solid #2f2f33;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
    }
    .btn {
      border: 1px solid #2f2f33;
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn.secondary {
      background: #1b1b1e;
      color: #f4f4f5;
    }
    #status {
      margin-top: 10px;
      font-size: 0.88rem;
      color: #d4d4d8;
    }
    .hint {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #8f8f99;
    }
    @media (max-width: 680px) {
      .form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top-row">
      <h1>COC Tracking</h1>
      <a class="back-link" href="./index.html">Back</a>
    </div>
    <p>Enter player tag and open live tracking page.</p>

    <div class="form">
      <input id="tagInput" type="text" value="GR80Y8VGR" placeholder="Player tag (example: GR80Y8VGR)">
      <button id="openBtn" class="btn" type="button">Open Tracking</button>
      <button id="copyBtn" class="btn secondary" type="button">Copy URL</button>
    </div>

    <div id="status">Ready.</div>
    <div class="hint">This opens the official tracker page in a new tab.</div>
  </main>

  <script>
    const tagInput = document.getElementById("tagInput");
    const openBtn = document.getElementById("openBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusEl = document.getElementById("status");

    function normalizeTag(raw) {
      return (raw || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
    }

    function trackerUrl(tag) {
      return "https://clash.sundell.dev/tracking/" + encodeURIComponent(tag);
    }

    function currentUrl() {
      const tag = normalizeTag(tagInput.value);
      return trackerUrl(tag);
    }

    openBtn.addEventListener("click", () => {
      const tag = normalizeTag(tagInput.value);
      if (!tag) {
        statusEl.textContent = "Enter a valid player tag.";
        return;
      }
      const url = trackerUrl(tag);
      window.open(url, "_blank", "noopener,noreferrer");
      statusEl.textContent = "Opened tracking for " + tag + ".";
    });

    copyBtn.addEventListener("click", async () => {
      const tag = normalizeTag(tagInput.value);
      if (!tag) {
        statusEl.textContent = "Enter a valid player tag.";
        return;
      }
      const url = currentUrl();
      try {
        await navigator.clipboard.writeText(url);
        statusEl.textContent = "Tracking URL copied.";
      } catch (error) {
        window.prompt("Copy this URL:", url);
      }
    });

  </script>
</body>
</html>
